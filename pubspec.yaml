name: aviator_predictor_pro
description: Premium dark-themed Aviator Predictor mobile app with Firebase backend.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.4
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI / UX
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  intl: ^0.19.0
  pin_code_fields: ^8.0.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  # fonts:
  #   - family: Orbitron
  #     fonts:
  #       - asset: assets/fonts/Orbitron-Regular.ttf
  #       - asset: assets/fonts/Orbitron-Bold.ttf
  #         weight: 700
